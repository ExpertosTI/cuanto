# ── cuanto — Docker Swarm + Traefik ─────────────────────────
#  Stack:       cuanto
#  Domain:      ${DOMAIN:-cuanto.renace.tech}
#  Network:     RenaceNet (overlay externa)
#  Entrypoints: web (:80), websecure (:443)
#  Cert:        letsencryptresolver

services:
  web:
    image: cuanto:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_INSFORGE_URL: ${VITE_INSFORGE_URL:-}
        VITE_INSFORGE_ANON_KEY: ${VITE_INSFORGE_ANON_KEY:-}
        VITE_WHATSAPP_BUSINESS: ${VITE_WHATSAPP_BUSINESS:-}
    networks:
      - RenaceNet
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 24M
      labels:
        - traefik.enable=true
        - traefik.docker.network=RenaceNet
        - traefik.constraint-label=traefik-public

        - traefik.http.routers.cuanto-http.rule=Host(`${DOMAIN:-cuanto.renace.tech}`)
        - traefik.http.routers.cuanto-http.entrypoints=web
        - traefik.http.routers.cuanto-http.middlewares=cuanto-redirect-https

        - traefik.http.routers.cuanto.rule=Host(`${DOMAIN:-cuanto.renace.tech}`)
        - traefik.http.routers.cuanto.entrypoints=websecure
        - traefik.http.routers.cuanto.tls=true
        - traefik.http.routers.cuanto.tls.certresolver=letsencryptresolver
        - traefik.http.routers.cuanto.service=cuanto-svc
        - traefik.http.routers.cuanto.middlewares=cuanto-security

        - traefik.http.services.cuanto-svc.loadbalancer.server.port=80
        - traefik.http.services.cuanto-svc.loadbalancer.healthcheck.path=/healthz
        - traefik.http.services.cuanto-svc.loadbalancer.healthcheck.interval=30s

        - traefik.http.middlewares.cuanto-redirect-https.redirectscheme.scheme=https
        - traefik.http.middlewares.cuanto-redirect-https.redirectscheme.permanent=true

        - traefik.http.middlewares.cuanto-security.headers.stsSeconds=31536000
        - traefik.http.middlewares.cuanto-security.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.cuanto-security.headers.stsPreload=true
        - traefik.http.middlewares.cuanto-security.headers.contentTypeNosniff=true
        - traefik.http.middlewares.cuanto-security.headers.frameDeny=true
        - traefik.http.middlewares.cuanto-security.headers.referrerPolicy=strict-origin-when-cross-origin

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  RenaceNet:
    external: true
