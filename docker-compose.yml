# ── cuanto — Docker Swarm + Traefik ─────────────────────────
#  Stack:       cuanto
#  Domain:      ${DOMAIN:-cuanto.renace.tech}
#  Network:     RenaceNet (overlay externa)
#  API:         PathPrefix(/api) → cuanto-api (SMTP + Evolution QR/OTP)

services:
  web:
    image: cuanto:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_INSFORGE_URL: ${VITE_INSFORGE_URL:-}
        VITE_INSFORGE_ANON_KEY: ${VITE_INSFORGE_ANON_KEY:-}
        VITE_WHATSAPP_BUSINESS: ${VITE_WHATSAPP_BUSINESS:-}
        VITE_PRO_CODE: ${VITE_PRO_CODE:-CUANTO-PRO}
        VITE_MASTER_EMAIL: ${VITE_MASTER_EMAIL:-expertostird@gmail.com}
        VITE_AUTH_URL: ${VITE_AUTH_URL:-}
    networks:
      - RenaceNet
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 24M
      labels:
        - traefik.enable=true
        - traefik.docker.network=RenaceNet
        - traefik.constraint-label=traefik-public

        - traefik.http.routers.cuanto-http.rule=Host(`${DOMAIN:-cuanto.renace.tech}`)
        - traefik.http.routers.cuanto-http.entrypoints=web
        - traefik.http.routers.cuanto-http.middlewares=cuanto-redirect-https
        - traefik.http.routers.cuanto-http.priority=10

        - traefik.http.routers.cuanto.rule=Host(`${DOMAIN:-cuanto.renace.tech}`)
        - traefik.http.routers.cuanto.entrypoints=websecure
        - traefik.http.routers.cuanto.tls=true
        - traefik.http.routers.cuanto.tls.certresolver=letsencryptresolver
        - traefik.http.routers.cuanto.service=cuanto-svc
        - traefik.http.routers.cuanto.middlewares=cuanto-security
        - traefik.http.routers.cuanto.priority=10

        - traefik.http.services.cuanto-svc.loadbalancer.server.port=80
        - traefik.http.services.cuanto-svc.loadbalancer.healthcheck.path=/healthz
        - traefik.http.services.cuanto-svc.loadbalancer.healthcheck.interval=30s

        - traefik.http.middlewares.cuanto-redirect-https.redirectscheme.scheme=https
        - traefik.http.middlewares.cuanto-redirect-https.redirectscheme.permanent=true

        - traefik.http.middlewares.cuanto-security.headers.stsSeconds=31536000
        - traefik.http.middlewares.cuanto-security.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.cuanto-security.headers.stsPreload=true
        - traefik.http.middlewares.cuanto-security.headers.contentTypeNosniff=true
        - traefik.http.middlewares.cuanto-security.headers.frameDeny=true
        - traefik.http.middlewares.cuanto-security.headers.referrerPolicy=strict-origin-when-cross-origin

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: cuanto-api:latest
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      AUTH_SECRET: ${AUTH_SECRET:-}
      MASTER_EMAILS: ${MASTER_EMAILS:-expertostird@gmail.com}
      MASTER_PHONES: ${MASTER_PHONES:-}
      AUTH_DEV_SHOW_CODE: ${AUTH_DEV_SHOW_CODE:-0}
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-info@renace.tech}
      SMTP_PASS: ${SMTP_PASS:-JustWork2027@}
      SMTP_FROM: ${SMTP_FROM:-Cuanto <info@renace.tech>}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-}
      WHATSAPP_BUSINESS: ${WHATSAPP_BUSINESS:-}
      VITE_WHATSAPP_BUSINESS: ${VITE_WHATSAPP_BUSINESS:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ACCOUNTS_DIR: /data
    volumes:
      - cuanto_accounts:/data
    networks:
      - RenaceNet
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 48M
      labels:
        - traefik.enable=true
        - traefik.docker.network=RenaceNet
        - traefik.constraint-label=traefik-public

        - traefik.http.routers.cuanto-api-http.rule=Host(`${DOMAIN:-cuanto.renace.tech}`) && PathPrefix(`/api`)
        - traefik.http.routers.cuanto-api-http.entrypoints=web
        - traefik.http.routers.cuanto-api-http.middlewares=cuanto-redirect-https
        - traefik.http.routers.cuanto-api-http.priority=100
        - traefik.http.routers.cuanto-api-http.service=cuanto-api-svc

        - traefik.http.routers.cuanto-api.rule=Host(`${DOMAIN:-cuanto.renace.tech}`) && PathPrefix(`/api`)
        - traefik.http.routers.cuanto-api.entrypoints=websecure
        - traefik.http.routers.cuanto-api.tls=true
        - traefik.http.routers.cuanto-api.tls.certresolver=letsencryptresolver
        - traefik.http.routers.cuanto-api.priority=100
        - traefik.http.routers.cuanto-api.service=cuanto-api-svc
        - traefik.http.routers.cuanto-api.middlewares=cuanto-security

        - traefik.http.services.cuanto-api-svc.loadbalancer.server.port=3000
        - traefik.http.services.cuanto-api-svc.loadbalancer.healthcheck.path=/healthz
        - traefik.http.services.cuanto-api-svc.loadbalancer.healthcheck.interval=30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  RenaceNet:
    external: true

volumes:
  cuanto_accounts:
