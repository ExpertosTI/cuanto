[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Proxy amigable al agente (Gemini en Netlify Functions)
[[redirects]]
  from = "/api/agent"
  to = "/.netlify/functions/agent"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/request-otp"
  to = "/.netlify/functions/auth-request-otp"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/verify-otp"
  to = "/.netlify/functions/auth-verify-otp"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/session"
  to = "/.netlify/functions/auth-session"
  status = 200
  force = true

# SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"
